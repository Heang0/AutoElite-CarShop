<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Account</ion-title>
    <ion-buttons slot="end" *ngIf="isLoggedIn">
      <ion-button (click)="doLogout()">
        <ion-icon name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>
  <div *ngIf="!isLoggedIn" class="login-container">
    <ion-icon name="person-outline"></ion-icon>
    <h2>Not Signed In</h2>
    <p>Sign in to access your account</p>
    <ion-button expand="block" (click)="goToAuth()" color="primary">
      Sign In / Register
    </ion-button>
  </div>

  <div *ngIf="isLoggedIn" class="account-container">
    <div class="profile-header">
      <div class="avatar-wrapper">
        <div class="avatar">
          <ion-img *ngIf="photoUrl" [src]="photoUrl"></ion-img>
          <span *ngIf="!photoUrl">{{ initials }}</span>
        </div>
        <ion-fab-button class="camera-btn" (click)="openUpload()">
          <ion-icon name="camera-outline"></ion-icon>
        </ion-fab-button>
      </div>
      <h2>{{ userEmail }}</h2>
      <p>{{ memberSince }}</p>
    </div>

    <div class="stats-row">
      <div class="stat-item">
        <ion-icon name="heart-outline"></ion-icon>
        <strong>{{ savedCount }}</strong>
        <span>Saved</span>
      </div>
      <div class="stat-item">
        <ion-icon name="time-outline"></ion-icon>
        <strong>{{ viewedCount }}</strong>
        <span>Viewed</span>
      </div>
      <div class="stat-item">
        <ion-icon name="calendar-outline"></ion-icon>
        <strong>{{ drivesCount }}</strong>
        <span>Test Drives</span>
      </div>
    </div>

    <ion-list class="menu-list">
      <ion-item button (click)="goTo('/favorites')">
        <ion-icon slot="start" name="heart-outline"></ion-icon>
        <ion-label>Saved Cars</ion-label>
        <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
      </ion-item>
      <ion-item button (click)="goTo('/recently-viewed')">
        <ion-icon slot="start" name="time-outline"></ion-icon>
        <ion-label>Recently Viewed</ion-label>
        <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
      </ion-item>
      <ion-item button (click)="goTo('/trade-in')">
        <ion-icon slot="start" name="cash-outline"></ion-icon>
        <ion-label>Trade-In</ion-label>
        <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
      </ion-item>
    </ion-list>

    <div class="logout-section">
      <ion-button expand="block" color="danger" (click)="doLogout()">
        <ion-icon slot="start" name="log-out-outline"></ion-icon>
        Sign Out
      </ion-button>
    </div>
  </div>
</ion-content>

<ion-toast [isOpen]="showToast" [message]="toastMsg" [duration]="3000" [color]="toastColor" position="top" (didDismiss)="showToast = false"></ion-toast>
